name: Docker Publish

on:
  push:
    branches: [ "main" ]
  # Allow manual runs
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  # github.repository defaults to owner/repo
  # but Docker image names must be lowercase
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push-images:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase GitHub repository
        run: |
          echo "LOWERCASE_REPO=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      - name: Build and push Backend API image
        uses: docker/build-push-action@v5
        with:
          context: ./app
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-api:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-api:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-api:buildcache,mode=max

      - name: Build and push Web/Nginx image
        uses: docker/build-push-action@v5
        with:
          context: ./web
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-web:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-web:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.LOWERCASE_REPO }}-web:buildcache,mode=max
