server {
    listen 3000;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Added headers for basic security
    add_header X-Frame-Options "SAMEORIGIN";
    add_header X-Content-Type-Options "nosniff";
    add_header Referrer-Policy "strict-origin-when-cross-origin";
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()";

    # Serve static files, fallback to index.html for React Router / Next.js
    location / {
        try_files $uri $uri.html $uri/ /index.html;
    }

    # Proxy /api requests to the Flask backend
    location /api/ {
        proxy_pass http://brew-brain:5000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Authorization "Bearer ${BREW_BRAIN_API_TOKEN}";
    }

    # Proxy /static (images, artifacts from Flask backend)
    location /static/ {
        proxy_pass http://brew-brain:5000/static/;
        proxy_set_header Host $host;
    }

    # WebSocket configuration for socket.io
    location /socket.io/ {
        proxy_pass http://brew-brain:5000/socket.io/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
